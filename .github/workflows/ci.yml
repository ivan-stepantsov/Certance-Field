name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Smoke-test compression engine
        run: npm run validate

  extension:
    name: VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - run: npm ci
        working-directory: vscode-extension

      - name: Type-check
        run: npm run check
        working-directory: vscode-extension

      - name: Lint
        run: npm run lint
        working-directory: vscode-extension

      - name: Verify shared modules in sync with root source
        run: npm run sync:check
        working-directory: vscode-extension

      - name: Verify branding pinned to the personal edition
        run: npm run brand:check
        working-directory: vscode-extension

      - name: Unit tests
        run: npm test
        working-directory: vscode-extension

      - name: Integration test (headless VS Code)
        run: xvfb-run -a npm run test:integration
        working-directory: vscode-extension
